<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="dockwatch-title dockwatch-desc">
  <title id="dockwatch-title">DockWatch logo</title>
  <desc id="dockwatch-desc">Dark square logo with stacked status bars and the DockWatch wordmark.</desc>
  <defs>
    <linearGradient id="dockwatch-gradient" x1="128" y1="24" x2="128" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182338"/>
      <stop offset="1" stop-color="#0f1725"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#dockwatch-gradient)"/>
  <rect x="12" y="12" width="232" height="232" rx="40" fill="none" stroke="#72b2ff" stroke-opacity="0.16"/>
  <rect x="86" y="74" width="84" height="12" rx="6" fill="#72b2ff" opacity="0.95"/>
  <rect x="78" y="96" width="100" height="12" rx="6" fill="#72b2ff" opacity="0.82"/>
  <rect x="92" y="118" width="72" height="12" rx="6" fill="#72b2ff" opacity="0.68"/>
  <circle cx="176" cy="80" r="10" fill="#f3b45b"/>
  <text x="128" y="172" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.8">DockWatch</text>
</svg>